<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Accessibility First</text>
        <text class="content" x="40" y="78">Title-aware SVG output with ARIA and global attribute support</text>
        <text class="content" x="40" y="98">Screen-reader friendly primitives for reusable icons and illustrations</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Element Classes</text>
        <text class="content" x="630" y="78">Circle, Path, Rect, Svg, Text and gradient-oriented wrappers</text>
        <text class="content" x="630" y="98">Immutable builders for composing standards-compliant SVG markup</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">File Loading</text>
        <text class="content" x="40" y="198">Secure external SVG loading with DOM parsing and sanitization</text>
        <text class="content" x="40" y="218">Safe inline injection for trusted icon assets</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Fluent Attributes</text>
        <text class="content" x="630" y="198">Concrete element methods backed by addAttribute() and SvgAttribute cases</text>
        <text class="content" x="630" y="218">No attribute traits required for expressive SVG element APIs</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Validation</text>
        <text class="content" x="40" y="318">Enum-backed checks for units, paint, line caps and gradient values</text>
        <text class="content" x="40" y="338">Deterministic exceptions for invalid SVG attribute values</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">XML Output</text>
        <text class="content" x="630" y="318">HTML-core rendering foundation with valid element and void output</text>
        <text class="content" x="630" y="338">Composable content, definitions, symbols, masks and patterns</text>
    </g>
</svg>
