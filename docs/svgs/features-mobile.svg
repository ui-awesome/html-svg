<!-- Mobile version - Single column -->
<svg viewBox="0 0 620 620" width="100%" height="580" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 14px; fill: #1a202c; }
        .content { font-size: 11px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="16" y="16" width="588" height="84" rx="6"/>
        <rect x="16" y="16" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="42">Accessibility First</text>
        <text class="content" x="32" y="66">Title-aware SVG output with ARIA and global attribute support</text>
        <text class="content" x="32" y="84">Screen-reader friendly primitives for reusable icons and illustrations</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="116" width="588" height="84" rx="6"/>
        <rect x="16" y="116" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="142">Element Classes</text>
        <text class="content" x="32" y="166">Circle, Path, Rect, Svg, Text and gradient-oriented wrappers</text>
        <text class="content" x="32" y="184">Immutable builders for composing standards-compliant SVG markup</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="216" width="588" height="84" rx="6"/>
        <rect x="16" y="216" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="242">File Loading</text>
        <text class="content" x="32" y="266">Secure external SVG loading with DOM parsing and sanitization</text>
        <text class="content" x="32" y="284">Safe inline injection for trusted icon assets</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="316" width="588" height="84" rx="6"/>
        <rect x="16" y="316" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="342">Fluent Attributes</text>
        <text class="content" x="32" y="366">Concrete element methods backed by addAttribute() and SvgAttribute cases</text>
        <text class="content" x="32" y="384">No attribute traits required for expressive SVG element APIs</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="416" width="588" height="84" rx="6"/>
        <rect x="16" y="416" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="442">Validation</text>
        <text class="content" x="32" y="466">Enum-backed checks for units, paint, line caps and gradient values</text>
        <text class="content" x="32" y="484">Deterministic exceptions for invalid SVG attribute values</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="516" width="588" height="84" rx="6"/>
        <rect x="16" y="516" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="542">XML Output</text>
        <text class="content" x="32" y="566">HTML-core rendering foundation with valid element and void output</text>
        <text class="content" x="32" y="584">Composable content, definitions, symbols, masks and patterns</text>
    </g>
</svg>
